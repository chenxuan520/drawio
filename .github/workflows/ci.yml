name: CI

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            case "$file" in
              js/embed.dev.js|js/diagramly/Embed.js)
                echo "Skipping $file"
                continue
                ;;
            esac

            echo "Checking $file"
            node --check "$file"
          done < <(find js -type f -name '*.js' ! -name '*.min.js' | sort)
